name: Android Build

on:
  push:
    branches: [ "main", "phase-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      # ✅ Changement important : npm install au lieu de npm ci
      - name: Install Dependencies
        run: npm install
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      
      # ✅ Vérification debug : Affiche le contenu de react-native.config.js
      - name: Debug Config
        run: |
          echo "Contenu de react-native.config.js :"
          cat react-native.config.js
          echo "Contenu de app.json :"
          cat app.json
      
      - name: Build Debug APK
        run: cd android && gradle assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TermuxStorageManager-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
